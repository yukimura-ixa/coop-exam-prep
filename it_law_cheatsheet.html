<script>
const C=[{"title": "PDPA — พ.ร.บ.คุ้มครองข้อมูลส่วนบุคคล พ.ศ.2562", "facts": ["ประกาศ 24 พ.ค. 2562 บทหลัก (หมวด 2 คุ้มครองข้อมูล, หมวด 3 สิทธิเจ้าของข้อมูล, บทกำหนดโทษ) มีผลบังคับใช้เต็มรูปแบบเมื่อพ้น 1 ปี", "ข้อมูลส่วนบุคคล (ม.6) = ข้อมูลที่ระบุตัวบุคคลได้ทางตรงหรือทางอ้อม ไม่รวมข้อมูลของผู้ถึงแก่กรรม และไม่รวมนิติบุคคล", "ผู้ควบคุมข้อมูล (Controller) = ผู้มีอำนาจตัดสินใจ; ผู้ประมวลผลข้อมูล (Processor) = ทำตามคำสั่งของผู้ควบคุม; ผู้ประมวลผลที่ไม่ทำตามคำสั่ง (ม.40) ถือเป็นผู้ควบคุม", "ข้อยกเว้นการบังคับใช้ (ม.4): ประโยชน์ส่วนตน/ครอบครัว, ความมั่นคงรัฐ, สื่อ/ศิลปะ/วรรณกรรมตามจริยธรรม, รัฐสภา, ศาล/กระบวนการยุติธรรม, บริษัทข้อมูลเครดิต", "ใช้บังคับผู้ควบคุมนอกราชอาณาจักร (ม.5) หากเสนอสินค้า/บริการ หรือเฝ้าติดตามพฤติกรรมเจ้าของข้อมูลในไทย", "ความยินยอม (ม.19) ต้องชัดแจ้ง เป็นหนังสือ/อิเล็กทรอนิกส์ แจ้งวัตถุประสงค์ แยกส่วนชัดเจน ถอนได้ทุกเมื่อ (ไม่กระทบที่ทำไปแล้วโดยชอบ)", "ผู้เยาว์อายุไม่เกิน 10 ปี (ม.20) ขอความยินยอมจากผู้ใช้อำนาจปกครอง; คนเสมือนไร้ความสามารถ→ผู้พิทักษ์; คนไร้ความสามารถ→ผู้อนุบาล", "หลัก Data Minimization (ม.22): เก็บเท่าที่จำเป็นภายใต้วัตถุประสงค์อันชอบด้วยกฎหมาย", "ข้อมูลอ่อนไหว (ม.26): เชื้อชาติ เผ่าพันธุ์ ความเห็นการเมือง ความเชื่อ ศาสนา พฤติกรรมทางเพศ ประวัติอาชญากรรม สุขภาพ ความพิการ สหภาพแรงงาน พันธุกรรม ชีวภาพ — ต้องยินยอมโดยชัดแจ้ง (ไม่รวมข้อมูลการศึกษา)", "สิทธิเจ้าของข้อมูล: เข้าถึง (ม.30), แก้ไข (ม.36), ลบ/Right to be Forgotten (ม.33), ระงับใช้ (ม.34), คัดค้าน (ม.32), โอนย้าย/Data Portability (ม.31)", "แจ้งเหตุละเมิดข้อมูลแก่สำนักงานฯ ภายใน 72 ชั่วโมงนับแต่ทราบเหตุ (ม.37); หากเสี่ยงสูงต้องแจ้งเจ้าของข้อมูลด้วย", "DPO (ม.41) จำเป็นเมื่อ: เป็นหน่วยงานรัฐตามประกาศ, ประมวลผลข้อมูลจำนวนมากเป็นประจำ, หรือกิจกรรมหลักเป็นข้อมูลอ่อนไหว; แต่งตั้งบุคคลภายนอกได้", "คณะกรรมการคุ้มครองข้อมูลส่วนบุคคล: วาระ 4 ปี (ม.12); องค์ประชุมไม่น้อยกว่ากึ่งหนึ่ง (ม.14); เสียงเท่ากันประธานชี้ขาด", "รัฐมนตรีว่าการกระทรวงดิจิทัลเพื่อเศรษฐกิจและสังคมเป็นผู้รักษาการ (ม.7); สำนักงานฯ เป็นหน่วยงานรัฐ ฐานะนิติบุคคล ไม่เป็นส่วนราชการ/รัฐวิสาหกิจ (ม.43)", "โทษอาญา (ม.79-80): ข้อมูลอ่อนไหวโดยมิชอบเพื่อแสวงประโยชน์ จำคุกไม่เกิน 1 ปี/ปรับไม่เกิน 1 ล้านบาท; เปิดเผยข้อมูลที่ล่วงรู้จากหน้าที่ จำคุกไม่เกิน 6 เดือน/ปรับไม่เกิน 500,000 บาท", "โทษปรับทางปกครองสูงสุด 5 ล้านบาท (ม.84 เรื่องข้อมูลอ่อนไหว); ไม่แจ้งเหตุละเมิดปรับไม่เกิน 3 ล้านบาท (ม.83); บางกรณีไม่เกิน 1 ล้านบาท (ม.82)", "โทษทางแพ่ง (ม.78): ชดใช้ค่าสินไหมตามจริง + ลงโทษเพิ่มได้ไม่เกิน 2 เท่า; อายุความ 3 ปีนับแต่รู้ความเสียหายและตัวผู้กระทำ หรือ 10 ปีนับแต่ละเมิด", "โอนข้อมูลไปต่างประเทศ (ม.28) ประเทศปลายทางต้องมีมาตรฐานคุ้มครองที่เพียงพอ; ในเครือกิจการใช้ BCRs ที่สำนักงานฯ รับรอง (ม.29); ร้องเรียนต่อคณะกรรมการผู้เชี่ยวชาญ (ม.73)"]}, {"title": "พ.ร.บ.คอมพิวเตอร์ พ.ศ.2550 (แก้ไข 2560)", "facts": ["บังคับใช้ พ.ร.บ.ฉบับแรก พ.ศ.2550 แก้ไขเพิ่มเติมโดยฉบับที่ 2 พ.ศ.2560 เหตุผล: การกระทำผิดซับซ้อนขึ้นตามเทคโนโลยี", "มาตรา 4: รัฐมนตรีว่าการกระทรวงดิจิทัลเพื่อเศรษฐกิจและสังคม (DE) เป็นผู้รักษาการและแต่งตั้งพนักงานเจ้าหน้าที่", "มาตรา 3 นิยาม: ข้อมูลจราจรทางคอมพิวเตอร์ = ข้อมูลการติดต่อสื่อสารที่แสดงแหล่งกำเนิด ต้นทาง ปลายทาง เส้นทาง เวลา; ผู้ให้บริการ = ทั้งผู้ให้เข้าถึงอินเทอร์เน็ตและผู้เก็บรักษาข้อมูล", "มาตรา 5: เข้าถึงระบบคอมพิวเตอร์ที่มีมาตรการป้องกันโดยมิชอบ (เดารหัสผ่าน) โทษจำคุกไม่เกิน 6 เดือน/ปรับไม่เกิน 10,000 บาท", "มาตรา 6: ล่วงรู้มาตรการป้องกันแล้วนำไปเปิดเผยโดยมิชอบ; มาตรา 7: เข้าถึงข้อมูลคอมพิวเตอร์โดยมิชอบ", "มาตรา 8: ดักรับ (Sniffing/Intercept) ข้อมูลที่อยู่ระหว่างการส่งโดยมิชอบ", "มาตรา 9: ทำให้เสียหาย ทำลาย แก้ไข เปลี่ยนแปลง เพิ่มเติมข้อมูลผู้อื่น โทษจำคุกไม่เกิน 5 ปี/ปรับไม่เกิน 100,000 บาท", "มาตรา 10: รบกวน/ขัดขวางการทำงานของระบบคอมพิวเตอร์ (DDoS) จนระงับ ชะลอ ขัดขวาง", "มาตรา 11: ส่งข้อมูล/อีเมลก่อความเดือดร้อนรำคาญ (Spam) เป็นความผิดพินัย ปรับไม่เกิน 100,000 บาท; ไม่เปิดช่องบอกเลิก (Unsubscribe) ปรับไม่เกิน 200,000 บาท", "มาตรา 12: กระทำต่อระบบความมั่นคง/บริการสาธารณะ (โครงสร้างพื้นฐานสำคัญ เช่น ไฟฟ้า ประปา) จำคุก 1-7 ปี ปรับ 20,000-140,000 บาท; ถ้าเป็นเหตุให้ผู้อื่นตาย จำคุก 5-20 ปี ปรับ 100,000-400,000 บาท", "มาตรา 13: จำหน่าย/เผยแพร่ชุดคำสั่ง (Malware/Tools) เพื่อใช้กระทำความผิด", "มาตรา 14: นำเข้าข้อมูลเท็จ/บิดเบือน/ปลอม; (1) โดยทุจริตหรือหลอกลวงประชาชน (ยกเว้นหมิ่นประมาทตาม ป.อาญา), (5) ผู้เผยแพร่/ส่งต่อโดยรู้ว่าเท็จ ผิดเช่นเดียวกับผู้นำเข้า", "มาตรา 15: ผู้ให้บริการรับผิดร่วม เว้นแต่พิสูจน์ว่าปฏิบัติตามประกาศรัฐมนตรีเรื่องแจ้งเตือนและระงับข้อมูล (Notice and Takedown)", "มาตรา 16: ตัดต่อ/เติม/ดัดแปลงภาพผู้อื่นให้เสียชื่อเสียง จำคุกไม่เกิน 3 ปี ปรับไม่เกิน 200,000 บาท เป็นความผิดอันยอมความได้ (วรรคสองคุ้มครองภาพผู้ตาย); มาตรา 16/2 ฝ่าฝืนคำสั่งศาลให้ทำลายข้อมูล โทษกึ่งหนึ่ง", "มาตรา 17: หลักการลงโทษการกระทำผิดนอกราชอาณาจักร (คนไทย/รัฐบาลหรือผู้เสียหายร้องขอ); มาตรา 17/1: คณะกรรมการเปรียบเทียบ 3 คน (คนหนึ่งเป็นพนักงานสอบสวน) ชำระค่าปรับแล้วคดีเลิกกัน; เปรียบเทียบได้เฉพาะ ม.5,6,7,11,13ว.1,16/2,23,24,27", "มาตรา 18-19: อำนาจพนักงานเจ้าหน้าที่; เรียกข้อมูลจราจร (ม.18(2)(3)) ไม่ต้องขอศาล แต่ยึด/อายัด/ถอดรหัส/ดักรับ ต้องขอศาล; ยึดได้ไม่เกิน 30 วัน ศาลขยายรวมไม่เกิน 60 วัน", "มาตรา 20: บล็อก/ระงับ/ลบข้อมูล โดยความเห็นชอบรัฐมนตรียื่นต่อศาล; คณะกรรมการกลั่นกรองข้อมูลคอมพิวเตอร์ 9 คน (ภาคเอกชน 3 ใน 9)", "มาตรา 22: พนักงานเจ้าหน้าที่เปิดเผยข้อมูลโดยมิชอบ จำคุกไม่เกิน 3 ปี ปรับไม่เกิน 60,000 บาท", "มาตรา 26: ผู้ให้บริการเก็บ Log File ไม่น้อยกว่า 90 วัน (สั่งเก็บเกินได้ไม่เกิน 2 ปี); ไม่ปฏิบัติตามเป็นความผิดพินัย ปรับไม่เกิน 500,000 บาท", "มาตรา 28-30: พนักงานเจ้าหน้าที่ต้องมีความรู้ความชำนาญด้านคอมพิวเตอร์ตามที่รัฐมนตรีกำหนด, เทียบเท่าพนักงานฝ่ายปกครองหรือตำรวจชั้นผู้ใหญ่ตาม ป.วิ.อาญา, ต้องแสดงบัตรประจำตัว", "การปรับเป็นพินัย (กฎหมายใหม่): ไม่มีโทษอาญา ไม่กักขังแทนค่าปรับ ไม่มีประวัติอาชญากรรม ใช้กับ Spam/ไม่เก็บ Log/ขัดคำสั่งเจ้าหน้าที่"]}, {"title": "พ.ร.บ.ธุรกรรมทางอิเล็กทรอนิกส์ พ.ศ.2544", "facts": ["ฉบับแรกประกาศใช้ พ.ศ.2544 แก้ไขเพิ่มเติมถึง (ฉบับที่ 4) พ.ศ.2562", "ธุรกรรม = การกระทำใดๆ เกี่ยวกับกิจกรรมทางแพ่งและพาณิชย์ หรือการดำเนินงานของรัฐ", "ข้อมูลอิเล็กทรอนิกส์ = ข้อความที่สร้าง ส่ง รับ เก็บรักษา หรือประมวลผลด้วยวิธีการทางอิเล็กทรอนิกส์ (เช่น อีเมล EDI)", "อิเล็กทรอนิกส์ = การใช้วิธีทางอิเล็กตรอน ไฟฟ้า คลื่นแม่เหล็กไฟฟ้า แสง แม่เหล็ก หรือวิธีอื่นที่คล้ายกัน", "มาตรา 7 (หลักไม่เลือกปฏิบัติ): ห้ามปฏิเสธผลทางกฎหมายของข้อความเพียงเพราะอยู่ในรูปข้อมูลอิเล็กทรอนิกส์", "มาตรา 8: ถ้ากฎหมายให้ทำเป็นหนังสือ ข้อมูลอิเล็กทรอนิกส์ที่เข้าถึงและนำกลับมาใช้ได้โดยความหมายไม่เปลี่ยน ถือว่าทำเป็นหนังสือแล้ว (Functional Equivalence)", "มาตรา 9: ลายมือชื่ออิเล็กทรอนิกส์เชื่อถือได้ ต้องระบุตัวเจ้าของ แสดงเจตนายอมรับข้อความ และใช้วิธีที่น่าเชื่อถือเหมาะกับพฤติการณ์", "ลายมือชื่ออิเล็กทรอนิกส์มีวัตถุประสงค์เพื่อระบุตัวบุคคลและแสดงการยอมรับข้อความ การประทับตรานิติบุคคลอิเล็กทรอนิกส์อนุโลมเป็นลายมือชื่อได้", "มาตรา 10: การเก็บต้นฉบับในรูปอิเล็กทรอนิกส์ต้องรักษาความถูกต้องครบถ้วนตั้งแต่วันสร้างเสร็จและแสดง/เรียกดูได้ภายหลัง", "มาตรา 11: ห้ามปฏิเสธการรับฟังพยานหลักฐานเพียงเพราะเป็นข้อมูลอิเล็กทรอนิกส์ การชั่งน้ำหนักพิจารณาความน่าเชื่อถือของวิธีสร้าง เก็บรักษา และสื่อสารข้อมูล", "มาตรา 13: คำเสนอ/คำสนองทำเป็นข้อมูลอิเล็กทรอนิกส์ได้ ห้ามปฏิเสธความสมบูรณ์ของสัญญาเพียงเพราะทำในรูปอิเล็กทรอนิกส์", "การเสนอขายผ่านระบบที่บุคคลทั่วไปเข้าถึงได้ (โพสต์ขายหน้าเว็บ) ถือเป็นคำเชิญชวนให้ทำคำเสนอ ไม่ใช่คำเสนอ", "การส่งถือว่าสำเร็จเมื่อข้อมูลพ้นการควบคุมของผู้ส่ง การรับมีผลเมื่อข้อมูลเข้าสู่ระบบของผู้รับ (แม้ยังไม่เปิดอ่าน)", "คณะกรรมการธุรกรรมทางอิเล็กทรอนิกส์: ประธาน = ผู้ทรงคุณวุฒิที่ ครม.แต่งตั้ง, กรรมการผู้ทรงคุณวุฒิ 8 คน, วาระ 4 ปี", "ผู้อำนวยการ ETDA (สำนักงานพัฒนาธุรกรรมทางอิเล็กทรอนิกส์) เป็นเลขานุการ และ ETDA เป็นหน่วยงานธุรการของคณะกรรมการ", "องค์ประชุมคณะกรรมการ = ไม่น้อยกว่ากึ่งหนึ่ง เสียงเท่ากันประธานออกเสียงชี้ขาด ประชุมผ่านสื่ออิเล็กทรอนิกส์ได้", "ธุรกิจบริการเกี่ยวกับธุรกรรมอิเล็กทรอนิกส์แบ่ง 3 ระดับ: แจ้งให้ทราบ / ขึ้นทะเบียน / รับใบอนุญาต (เข้มงวดสูงสุด)", "รัฐมนตรีว่าการกระทรวงดิจิทัลเพื่อเศรษฐกิจและสังคมเป็นผู้รักษาการ การยกเว้นไม่ใช้กฎหมายกับธุรกรรมใดต้องตราเป็นพระราชกฤษฎีกา"]}, {"title": "พ.ร.บ.ไซเบอร์ พ.ศ.2562", "facts": ["ชื่อเต็ม: พ.ร.บ.การรักษาความมั่นคงปลอดภัยไซเบอร์ พ.ศ.2562 ใช้บังคับวันถัดจากวันประกาศในราชกิจจานุเบกษา (ม.2)", "ผู้รักษาการ: นายกรัฐมนตรี (ม.4)", "\"ไซเบอร์\" = ข้อมูล/การสื่อสารจากการใช้เครือข่ายคอมพิวเตอร์ อินเทอร์เน็ต หรือโครงข่ายโทรคมนาคม (ม.3)", "ภัยคุกคามทางไซเบอร์ = การกระทำโดยมิชอบผ่านคอมพิวเตอร์/โปรแกรมไม่พึงประสงค์ มุ่งโจมตีระบบหรือข้อมูล", "คณะกรรมการ 3 ชุด: กมช. (นโยบายสูงสุด), กกม. (กำกับดูแล/รับมือภัยร้ายแรง), กบส. (บริหารสำนักงาน)", "กมช. ประธาน = นายกรัฐมนตรี; กกม. และ กบส. ประธาน = รมว.ดิจิทัลเพื่อเศรษฐกิจและสังคม", "กมช. มีกรรมการผู้ทรงคุณวุฒิไม่เกิน 7 คน วาระ 4 ปี ไม่เกิน 2 วาระ; ครม. เป็นผู้แต่งตั้ง (ม.5,7)", "สำนักงาน (สกมช.) เป็นหน่วยงานของรัฐ นิติบุคคล ไม่เป็นส่วนราชการหรือรัฐวิสาหกิจ (ม.20)", "สำนักงานจัดตั้งศูนย์ประสานฯ National CERT เป็นหน่วยงานภายใน (ม.22)", "เลขาธิการ: อายุ 35–60 ปี วาระ 4 ปี ไม่เกิน 2 วาระ; กมช. เป็นผู้แต่งตั้ง/ถอดถอน (ม.30,33,9)", "CII (โครงสร้างพื้นฐานสำคัญทางสารสนเทศ) 7 ด้าน: ความมั่นคงของรัฐ, บริการภาครัฐ, การเงินการธนาคาร, ไอทีและโทรคมนาคม, ขนส่งและโลจิสติกส์, พลังงานและสาธารณูปโภค, สาธารณสุข (ม.49)", "CII ต้องประเมินความเสี่ยง/ตรวจสอบ (Audit) อย่างน้อยปีละ 1 ครั้ง และรายงานเหตุภัยคุกคามทันที (ม.54)", "ภัยคุกคาม 3 ระดับ: (1) ไม่ร้ายแรง=ระบบด้อยประสิทธิภาพ (2) ร้ายแรง=ใช้การไม่ได้/กระทบความมั่นคง (3) วิกฤติ=วงกว้างระดับประเทศ รัฐคุมไม่ได้/คนตายมาก (ม.60)", "ภัยระดับร้ายแรง: กกม. สั่งการได้ แต่การเข้าถึงข้อมูล/ยึดอายัดคอมพิวเตอร์ต้องยื่นคำร้องต่อศาล (คำร้องไต่สวนฉุกเฉิน); ยึดได้ไม่เกิน 30 วัน (ม.65,66)", "ภัยระดับวิกฤติ: เป็นอำนาจสภาความมั่นคงแห่งชาติ; กรณีเร่งด่วน กมช. มอบให้เลขาธิการดำเนินการก่อนแล้วแจ้งศาลโดยเร็ว (ม.67,68)", "อุทธรณ์คำสั่งได้เฉพาะภัยระดับไม่ร้ายแรงเท่านั้น (ม.69)", "โทษเปิดเผยข้อมูลโดยมิชอบ: จำคุกไม่เกิน 3 ปี หรือปรับไม่เกิน 60,000 บาท (ม.70); ประมาททำให้ล่วงรู้ จำคุกไม่เกิน 1 ปี ปรับ 20,000 (ม.71)", "CII ไม่รายงานเหตุภัยคุกคาม โทษปรับไม่เกิน 200,000 บาท (ม.73); ฝ่าฝืนคำสั่ง กกม. ปรับรายวันไม่เกินวันละ 10,000 บาท (ม.75)", "บทเฉพาะกาล: สำนักงานปลัดกระทรวงดิจิทัลฯ ทำหน้าที่สำนักงานไปพลางก่อน จัดตั้งสำนักงานให้เสร็จภายใน 1 ปี (ม.80)"]}, {"title": "ระบบสารสนเทศ & ฐานข้อมูล", "facts": ["ประเภทระบบสารสนเทศตามระดับ: TPS (ประมวลผลรายการประจำวัน เช่น POS/ATM), MIS (รายงานสรุปสำหรับผู้จัดการ), DSS (ช่วยวิเคราะห์ตัดสินใจ What-if), ESS (ข้อมูลสรุป/แนวโน้มสำหรับผู้บริหารระดับสูง)", "ระบบเฉพาะทาง: ERP บูรณาการกระบวนการธุรกิจทั้งองค์กร, CRM จัดการความสัมพันธ์ลูกค้า, GIS จัดการข้อมูลเชิงพื้นที่, BI เปลี่ยนข้อมูลดิบเป็นสารสนเทศเพื่อการตัดสินใจ", "Data = ข้อมูลดิบ/ข้อเท็จจริง; Information = Data ที่ผ่านการประมวลผลจนมีความหมายและใช้ประโยชน์ได้", "องค์ประกอบระบบสารสนเทศ: Hardware, Software, Peopleware, Data, Network (คู่แข่งไม่ใช่องค์ประกอบ)", "SDLC ขั้นตอน: Planning (วางแผน) -> Analysis (วิเคราะห์) -> Design (ออกแบบ) -> Implementation (พัฒนา/ติดตั้ง) -> Maintenance; วงจรสิ้นสุดเมื่อระบบถูกยกเลิกใช้งาน", "Feasibility Study: Technical (เทคนิค), Economic (คุ้มทุน), Operational (ความพร้อมบุคลากร/การดำเนินงาน), Legal (กฎหมาย)", "กลยุทธ์ติดตั้งระบบ: Direct Cutover (เปลี่ยนทันที เสี่ยงสุด), Parallel (คู่ขนาน), Phased (ทีละโมดูล), Pilot (นำร่องบางหน่วยงาน)", "Waterfall เน้นวางแผน/เอกสารล่วงหน้าเป็นลำดับขั้น; Agile ทำงานเป็นรอบสั้น (Sprint) ปรับเปลี่ยนได้; DevOps รวมทีมพัฒนากับปฏิบัติการ", "ระดับการทดสอบ: Unit -> Integration (ส่วนประกอบทำงานร่วมกัน) -> System -> UAT (ผู้ใช้ยอมรับ)", "DFD สัญลักษณ์: Process (วงกลม/สี่เหลี่ยมมุมมน), External Entity, Data Store, Data Flow — ใช้แสดงการไหลของข้อมูล", "UML: Use Case (Actor โต้ตอบระบบ), Class Diagram (โครงสร้างคลาส/attribute/ความสัมพันธ์), Sequence (ลำดับส่งข้อความตามเวลา), Activity (workflow); OO: Attribute=ข้อมูล, Method=พฤติกรรม", "ERD สัญลักษณ์: Entity (สี่เหลี่ยม), Attribute (วงรี; วงรีเส้นคู่ = Multi-valued), Relationship (สี่เหลี่ยมขนมเปียกปูน)", "Normalization ลดความซ้ำซ้อน: 1NF=ค่า Atomic แบ่งย่อยไม่ได้, 2NF=ขึ้นกับ PK ทั้งหมด, 3NF=ไม่มี Transitive Dependency (3NF พอสำหรับงานทั่วไป)", "Primary Key: Unique + Not Null (ระบุแถวไม่ซ้ำ); Foreign Key: อ้างอิงค่าของ PK ในอีกตารางเพื่อเชื่อมความสัมพันธ์", "ความสัมพันธ์ M:N ต้องแยกด้วย Associative Entity (Junction Table) โดยนำ PK ทั้งสองมาเป็น FK", "SQL กลุ่มคำสั่ง: DDL (CREATE/ALTER/DROP โครงสร้าง), DML (SELECT/INSERT/UPDATE/DELETE ข้อมูล), DCL (GRANT/REVOKE สิทธิ์), TCL (COMMIT/ROLLBACK); TRUNCATE ลบข้อมูลแต่คงโครงสร้าง", "SQL พื้นฐาน: WHERE กรองแถว, ORDER BY เรียงลำดับ (ASC/DESC), GROUP BY จัดกลุ่มใช้กับ Aggregate (COUNT/SUM/AVG), JOIN รวมตารางผ่าน PK-FK, HAVING กรองหลังจัดกลุ่ม", "วัตถุฐานข้อมูลอื่น: VIEW (ตารางเสมือนจาก SELECT), Index (เพิ่มความเร็วค้นหา), Trigger (ทำงานอัตโนมัติเมื่อเกิด DML), Stored Procedure (ชุดคำสั่งเก็บไว้ นำกลับมาใช้ซ้ำ); DBMS เป็นตัวกลางจัดการฐานข้อมูล"]}, {"title": "Excel / Word — สอบปฏิบัติ", "facts": ["VLOOKUP(ค่าค้นหา, ตาราง, ลำดับคอลัมน์, FALSE) — ค้นจากคอลัมน์ซ้ายสุดเสมอ, FALSE = ตรงเป๊ะ, ไม่เจอ = #N/A", "SUMIF(ช่วงเงื่อนไข, เงื่อนไข, ช่วงรวม) รวมแบบ 1 เงื่อนไข · SUMIFS(ช่วงรวม, ช่วงเงื่อนไข1, ค่า1, ...) หลายเงื่อนไข — สังเกตลำดับอาร์กิวเมนต์สลับกัน", "COUNTIF นับเซลล์ตามเงื่อนไข · COUNTIFS หลายเงื่อนไข · COUNTA นับเซลล์ไม่ว่าง · COUNT นับเฉพาะตัวเลข", "IFERROR(สูตร, ค่าถ้าพลาด) — ครอบ VLOOKUP กัน #N/A", "$A$1 สัมบูรณ์ (ล็อกทั้งคู่) · A$1 ล็อกแถว · $A1 ล็อกคอลัมน์ · กด F4 สลับ", "PivotTable: Insert → PivotTable · ลาก field ไป Rows/Columns/Values/Filters · เปลี่ยน Sum↔Count ที่ Value Field Settings · Refresh เมื่อข้อมูลเปลี่ยน", "ตรึงหัวตาราง: View → Freeze Panes · กรอง: Ctrl+Shift+L · เรียง: Data → Sort", "ข้อความ: LEFT/RIGHT/MID ตัดข้อความ · & หรือ CONCATENATE ต่อข้อความ · TRIM ตัดช่องว่าง · LEN นับตัวอักษร", "คีย์ลัดหลัก: Ctrl+S บันทึก · Ctrl+Z/Y เลิกทำ/ทำซ้ำ · Ctrl+C/X/V คัดลอก/ตัด/วาง · Ctrl+F ค้นหา · Ctrl+H แทนที่ · Ctrl+A เลือกทั้งหมด", "นามสกุลไฟล์: .xlsx ปกติ · .xlsm มีมาโคร · .csv ข้อความคั่นจุลภาค · .docx Word · .pdf คงรูปแบบ/ส่งทางการ", "Word จดหมายเวียน: Mailings → Start Mail Merge → เลือกรายชื่อจาก Excel → แทรก Merge Field → Finish & Merge", "Word สารบัญอัตโนมัติ: ใส่ Heading 1/2/3 ก่อน → References → Table of Contents", "Word: Track Changes (Review) ดูการแก้ไข · Insert → Page Number เลขหน้า · Layout → ขอบ/แนวกระดาษ", "หนังสือราชการไทย: กระดาษ A4 · ฟอนต์ TH Sarabun ขนาด 16 pt", "Conditional Formatting (Home) — ระบายสีเซลล์อัตโนมัติตามเงื่อนไข เช่น ค่าติดลบสีแดง"]}, {"title": "พ.ร.ก.อาชญากรรมทางเทคโนโลยี พ.ศ.2566", "facts": ["ใช้บังคับตั้งแต่วันถัดจากวันประกาศในราชกิจจานุเบกษา (มาตรา 2) — ฉบับแรก พ.ศ. 2566 ผู้รับสนองฯ พล.อ.ประยุทธ์ จันทร์โอชา, ฉบับที่ 2 พ.ศ. 2568 ผู้รับสนองฯ แพทองธาร ชินวัตร", "อาชญากรรมทางเทคโนโลยี = ความผิดตามกฎหมายคอมพิวเตอร์เพื่อฉ้อโกง กรรโชก หรือรีดเอาทรัพย์ หรือความผิดฐานดังกล่าวโดยใช้ระบบคอมพิวเตอร์เป็นเครื่องมือ (มาตรา 3)", "สถาบันการเงินและผู้ประกอบธุรกิจต้องเปิดเผย/แลกเปลี่ยนข้อมูลบัญชีและธุรกรรมระหว่างกัน แล้วแจ้ง ตร. หรือ ดีเอสไอ และสำนักงาน ปปง. ทราบทันที (มาตรา 4)", "ตร. ดีเอสไอ หรือ ปปง. มีอำนาจสั่งให้ค่ายมือถือเปิดเผยข้อมูลลงทะเบียนผู้ใช้และข้อมูลจราจรคอมพิวเตอร์ ส่งภายในเวลาที่ผู้สั่งกำหนด (มาตรา 5)", "ธนาคารพบเหตุสงสัยเอง: ระงับธุรกรรมชั่วคราวไม่เกิน 7 วัน แจ้งธนาคารรับโอนถัดไประงับต่อ เจ้าพนักงานต้องดำเนินการใน 7 วัน มิฉะนั้นยกเลิกการระงับ (มาตรา 6)", "ผู้เสียหายแจ้งธนาคาร: ระงับธุรกรรมทันทีทุกทอด ผู้เสียหายต้องไปร้องทุกข์ภายใน 72 ชั่วโมง พนักงานสอบสวนพิจารณาภายใน 7 วัน มิฉะนั้นยกเลิกการระงับ (มาตรา 7)", "ร้องทุกข์ได้ที่สถานีตำรวจแห่งใดก็ได้ทั่วราชอาณาจักร หรือ บช.สอท. และร้องทุกข์ทางอิเล็กทรอนิกส์ได้ ถือว่าชอบด้วย ป.วิ.อาญา (มาตรา 8)", "บัญชีม้า/ซิมม้า (เปิดหรือยินยอมให้ผู้อื่นใช้บัญชี บัตรอิเล็กทรอนิกส์ หรือเบอร์มือถือ โดยรู้หรือควรรู้ว่าใช้ทำผิด): จำคุกไม่เกิน 3 ปี หรือปรับไม่เกิน 300,000 บาท (มาตรา 9)", "เป็นธุระจัดหา โฆษณา ไขข่าว ซื้อขายบัญชีม้าหรือซิมม้า: จำคุก 2-5 ปี หรือปรับ 200,000-500,000 บาท — โทษหนักกว่าคนเปิดบัญชี (มาตรา 10, 11)", "ข้อมูลส่วนบุคคลที่เปิดเผย/แลกเปลี่ยนตาม พ.ร.ก.นี้ ไม่อยู่ภายใต้ PDPA แต่ห้ามเปิดเผยต่อบุคคลที่ไม่มีหน้าที่เกี่ยวข้อง (มาตรา 12)", "ฉบับที่ 2 (พ.ศ. 2568) ตั้ง ศปอท. (ศูนย์ปฏิบัติการเพื่อป้องกันและปราบปรามอาชญากรรมทางเทคโนโลยี) ในสำนักงานปลัดกระทรวงดิจิทัลฯ (มาตรา 8/5)", "เมื่อ ศปอท. แจ้งรายชื่อบุคคล/เลขที่กระเป๋าสินทรัพย์ดิจิทัล ธนาคารต้องปฏิเสธเปิดบัญชี ระงับบริการ หรือปิดบัญชีทันที จนกว่าจะเพิกถอนรายชื่อ (มาตรา 4/2)", "ค่ายมือถือมีหน้าที่คัดกรองเนื้อหา SMS ตามมาตรฐานที่สำนักงาน กสทช. กำหนด (มาตรา 4/1) และฉบับที่ 2 ขยายนิยามครอบคลุมสินทรัพย์ดิจิทัล/กระเป๋า wallet", "นายกรัฐมนตรีแ
