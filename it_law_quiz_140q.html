<script>
const ALL=[{"cat": "PDPA", "q": "ตาม พ.ร.บ.คุ้มครองข้อมูลส่วนบุคคล พ.ศ.2562 \"ข้อมูลส่วนบุคคล\" หมายความว่าอย่างไร", "o": ["ข้อมูลเกี่ยวกับบุคคลซึ่งทำให้สามารถระบุตัวบุคคลนั้นได้ไม่ว่าทางตรงหรือทางอ้อม", "ข้อมูลเกี่ยวกับบุคคลธรรมดาซึ่งทำให้สามารถระบุตัวบุคคลนั้นได้ แต่ไม่รวมถึงข้อมูลของผู้ถึงแก่กรรม", "ข้อมูลเกี่ยวกับบุคคลซึ่งทำให้สามารถระบุตัวบุคคลนั้นได้ไม่ว่าทางตรงหรือทางอ้อม แต่ไม่รวมถึงข้อมูลของผู้ถึงแก่กรรมโดยเฉพาะ", "ข้อมูลเกี่ยวกับนิติบุคคลซึ่งทำให้สามารถระบุตัวตนได้"], "c": 2, "e": "มาตรา 6 นิยามข้อมูลส่วนบุคคลว่าเป็นข้อมูลที่ระบุตัวบุคคลได้ทางตรงหรือทางอ้อม แต่ไม่รวมข้อมูลของผู้ถึงแก่กรรม"}, {"cat": "PDPA", "q": "ข้อใดต่อไปนี้ ไม่ใช่ \"ข้อมูลส่วนบุคคล\" ตามคำนิยามในพระราชบัญญัตินี้", "o": ["ชื่อ-นามสกุล ของนายสมชาย", "ข้อมูลการเสียชีวิตของนางสมศรี", "ที่อยู่และเบอร์โทรศัพท์ของนายสมศักดิ์", "ข้อมูลลายพิมพ์นิ้วมือของนางสาวสมหญิง"], "c": 1, "e": "มาตรา 6 ไม่ใช้บังคับกับข้อมูลของผู้ถึงแก่กรรม ข้อมูลการเสียชีวิตจึงไม่ใช่ข้อมูลส่วนบุคคล"}, {"cat": "PDPA", "q": "\"ผู้ควบคุมข้อมูลส่วนบุคคล\" คือใคร", "o": ["บุคคลหรือนิติบุคคลซึ่งดำเนินการเก็บรวบรวม ใช้ หรือเปิดเผยข้อมูลตามคำสั่งของผู้ว่าจ้าง", "บุคคลหรือนิติบุคคลซึ่งมีอำนาจหน้าที่ตัดสินใจเกี่ยวกับการเก็บรวบรวม ใช้ หรือเปิดเผยข้อมูลส่วนบุคคล", "พนักงานเจ้าหน้าที่ที่รัฐมนตรีแต่งตั้งให้ปฏิบัติตามพระราชบัญญัตินี้", "คณะกรรมการคุ้มครองข้อมูลส่วนบุคคล"], "c": 1, "e": "มาตรา 6 ผู้ควบคุมข้อมูลคือผู้มีอำนาจหน้าที่ตัดสินใจเกี่ยวกับการเก็บรวบรวม ใช้ หรือเปิดเผยข้อมูล"}, {"cat": "PDPA", "q": "ข้อใดคือความแตกต่างสำคัญระหว่าง \"ผู้ควบคุมข้อมูล\" และ \"ผู้ประมวลผลข้อมูล\"", "o": ["ผู้ควบคุมข้อมูลเป็นนิติบุคคลเสมอ ส่วนผู้ประมวลผลเป็นบุคคลธรรมดา", "ผู้ควบคุมข้อมูลมีอำนาจตัดสินใจเกี่ยวกับการประมวลผลข้อมูล ส่วนผู้ประมวลผลดำเนินการตามคำสั่ง", "ผู้ควบคุมข้อมูลต้องอยู่ในราชอาณาจักรไทยเท่านั้น ส่วนผู้ประมวลผลอาจอยู่นอกราชอาณาจักรได้", "ผู้ควบคุมข้อมูลมีหน้าที่รักษาความลับ ส่วนผู้ประมวลผลไม่มีหน้าที่ดังกล่าว"], "c": 1, "e": "มาตรา 6 หัวใจคืออำนาจตัดสินใจ ผู้ควบคุมตัดสินใจ ส่วนผู้ประมวลผลทำตามคำสั่งของผู้ควบคุม"}, {"cat": "PDPA", "q": "พร let cur='ALL';
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=(i*7+3)%(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}
// deterministic-ish shuffle avoiding Math.random not needed; but we want variety: use time
function rshuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const cats=['ALL',...[...new Set(ALL.map(q=>q.cat))]];
let items=[];
function render(){
  const host=document.getElementById('list');host.innerHTML='';
  let arr=ALL.map((q,i)=>({q,i})).filter(x=>cur==='ALL'||x.q.cat===cur);
  if(document.getElementById('shuf').checked)arr=rshuffle(arr);
  items=arr;
  arr.forEach((x,idx)=>{
    const q=x.q;
    const d=document.createElement('div');d.className='q';d.dataset.gi=x.i;
    let opts=q.o.map((o,oi)=>`<label class="opt"><input type="radio" name="q${x.i}" value="${oi}">${o}</label>`).join('');
    d.innerHTML=`<div class="qh"><span class="qn">${idx+1}.</span><span>${q.q}</span><span class="tag">${q.cat}</span></div>${opts}<div class="exp"><b>เฉลย:</b> ข้อ ${'กขคง'[q.c]}) ${q.o[q.c]}<br>${q.e||''}</div>`;
    host.appendChild(d);
  });
  document.getElementById('score').style.display='none';
}
function grade(){
  let correct=0,ans=0;
  document.querySelectorAll('.q').forEach(d=>{
    const gi=+d.dataset.gi;const q=ALL[gi];
    const sel=d.querySelector('input:checked');
    const exp=d.querySelector('.exp');exp.classList.add('show');
    d.querySelectorAll('.opt').forEach((op,oi)=>{
      op.classList.remove('correct','wrong');
      if(oi===q.c)op.classList.add('correct');
    });
    if(sel){ans++;const v=+sel.value;if(v===q.c)correct++;else d.querySelectorAll('.opt')[v].classList.add('wrong');}
  });
  const s=document.getElementById('score');
  const tot=items.length;
  s.style.display='block';
  s.textContent=`คะแนน ${correct}/${tot}  (ตอบ ${ans} ข้อ · ${tot?Math.round(correct/tot*100):0}%)`;
  window.scrollTo(0,0);
}
function reset(){render();window.scrollTo(0,0);}
function buildCats(){
  const c=document.getElementById('cats');
  cats.forEach(cat=>{
    const b=document.createElement('button');b.className='chip'+(cat===cur?' on':'');
    b.textContent=cat==='ALL'?('ทั้งหมด ('+ALL.length+')'):cat+' ('+ALL.filter(q=>q.cat===cat).length+')';
    b.onclick=()=>{cur=cat;buildCats();render();};c.appendChild(b);
  });
}
buildCats();render();
</script>
